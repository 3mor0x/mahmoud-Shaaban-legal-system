<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول | نظام إدارة المحاماة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow-bg"></div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-balance-scale"></i></div>
            </div>
            <h2>مرحباً بعودتك</h2>
            <p class="subtitle">سجل دخولك للوصول إلى لوحة التحكم</p>

            <!-- 🚨 تعديل: شيلنا الـ action عشان الجافاسكريبت والباك إند يتحكموا بالكامل -->
            <form id="loginForm">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="emailInput" placeholder="admin@gmail.com" required dir="ltr">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="passwordInput" placeholder="••••••••" required dir="ltr">
                    </div>
                </div>

                <!-- 🔒 حقل الـ OTP المخفي: هيظهر أوتوماتيك لو الحساب محتاج تفعيل -->
                <div class="input-group" id="otpGroup" style="display: none; margin-top: 15px;">
                    <label style="color: var(--gold);">رمز التأكيد (OTP)</label>
                    <div class="input-wrapper" style="border-color: var(--gold);">
                        <i class="fas fa-key" style="color: var(--gold);"></i>
                        <input type="text" id="otpInput" placeholder="أدخل الـ 6 أرقام" dir="ltr" maxlength="6">
                    </div>
                </div>

                <div class="options">
                    <label class="checkbox-container">
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        تذكرني
                    </label>
                    <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">تسجيل الدخول <i class="fas fa-arrow-left"></i></button>
            </form>
            
            <div class="register-navigation">
                <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد الآن <i class="fas fa-user-plus"></i></a></p>
            </div>

            <div class="back-home">
                <a href="../index.html"><i class="fas fa-home"></i> العودة للموقع الرئيسي</a>
            </div>
        </div>
    </div>

    <!-- 🚨 استدعاء السكريبت كـ module عشان الـ imports تشتغل صح -->
    <script type="module" src="login.js"></script>
</body>
</html>
